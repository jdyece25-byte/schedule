<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동영 6월 스케줄</title>
<style>
:root{
  --bg:#0d0d10;--s1:#141418;--s2:#1b1b22;--s3:#22222c;
  --bd:#2c2c38;--bd2:#3a3a48;
  --tx:#e8e8f0;--tx2:#8888a0;--tx3:#44445a;
  --acc:#6366f1;
  --c-class:#3b82f6;--c-lab:#06b6d4;--c-sem:#8b5cf6;--c-exam:#ef4444;
  --c-tutor:#f97316;--c-ws:#22c55e;--c-tr:#38bdf8;--c-dl:#a855f7;--c-proj:#f59e0b;
  --c1:#3b82f6;--c2:#f59e0b;--c3:#06b6d4;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--s1)}
.logo{font-size:15px;font-weight:700;color:var(--tx)}.logo em{color:var(--acc);font-style:normal}
.ntabs{display:flex;gap:3px;background:var(--s3);border-radius:9px;padding:3px}
.ntab{padding:5px 16px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;color:var(--tx2);border:none;background:transparent;transition:all .12s}
.ntab.on{background:var(--acc);color:#fff}
.badge-n{display:inline-block;background:var(--c-exam);color:#fff;border-radius:8px;font-size:9px;padding:1px 5px;margin-left:4px;font-weight:700;vertical-align:middle}

/* VIEWS */
.view{flex:1;overflow:hidden;display:none}.view.on{display:flex}

/* ═══════════ CALENDAR VIEW ═══════════ */
#v-cal{flex-direction:row}
.cal-main{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:16px 16px 0}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:5px}
.dow{text-align:center;font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.5px;padding:2px 0}
.dow.s{color:#f87171}.dow.sa{color:#60a5fa}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;overflow-y:auto;flex:1;padding-bottom:12px}
.dc{background:var(--s2);border:1px solid var(--bd);border-radius:9px;min-height:100px;padding:7px 6px 5px;cursor:pointer;transition:border-color .12s;display:flex;flex-direction:column}
.dc:hover{border-color:var(--bd2)}
.dc.tod{border-color:var(--acc)!important;border-width:1.5px}
.dc.sel{border-color:var(--acc);background:var(--s3)}
.dc.dim{opacity:.22;pointer-events:none}
.dc.ebg{background:#1d1010}.dc.wbg{background:#0f1a10}.dc.tbg{background:#0c141d}
.dn{font-size:12px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:4px;color:var(--tx)}
.dn.s{color:#f87171}.dn.sa{color:#60a5fa}
.tb{font-size:9px;background:var(--acc);color:#fff;border-radius:3px;padding:1px 4px;font-weight:700}
.chip{border-radius:3px;padding:2px 5px;margin:1px 0;font-size:9px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.more{font-size:9px;color:var(--tx3);padding-left:2px;margin-top:1px}

/* PANEL */
.panel{width:280px;min-width:280px;border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;background:var(--s1)}
.ph{padding:16px 16px 12px;border-bottom:1px solid var(--bd)}
.pd{font-size:16px;font-weight:700;color:var(--tx)}.ps{font-size:11px;color:var(--tx2);margin-top:2px}
.pb{flex:1;overflow-y:auto;padding:12px 14px}
.pmt{color:var(--tx3);font-size:12px;text-align:center;margin-top:30px}
.etl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin:10px 0 4px;opacity:.7}
.etl:first-child{margin-top:0}
.ec{background:var(--s3);border-radius:8px;padding:9px 11px;margin-bottom:3px;border-left:2.5px solid transparent}
.ect{font-size:12px;font-weight:700;color:var(--tx);margin-bottom:3px}
.ecm{font-size:10px;color:var(--tx2);line-height:1.5}
.ecn{font-size:10px;font-weight:600;color:#f59e0b;margin-top:2px}
/* travel connector */
.tc{display:flex;align-items:center;gap:5px;padding:2px 4px;margin:2px 0}
.tcl{flex:1;height:1px;background:var(--bd)}
.tcp{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap}
.tcb{font-size:10px;font-weight:700;white-space:nowrap}
/* alerts in panel */
.pal{border-top:1px solid var(--bd);padding:10px 14px}
.pat{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);margin-bottom:8px}
.pai{display:flex;gap:6px;align-items:flex-start;margin-bottom:5px}
.pad{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0}
.pax{font-size:10px;color:var(--tx2);line-height:1.5}.pax b{color:var(--tx);font-weight:600}
/* legend */
.leg{display:flex;flex-wrap:wrap;gap:8px;padding:8px 16px;border-top:1px solid var(--bd);background:var(--s1)}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--tx2)}
.ld{width:8px;height:8px;border-radius:2px}

/* ═══════════ LIST VIEW (in cal tab) ═══════════ */
.lv-wrap{flex:1;overflow-y:auto;display:none;flex-direction:column;gap:2px;padding:16px}
.lv-wrap.on{display:flex}
.cal-main.lm .cal-grid,.cal-main.lm .dow-row{display:none}
.cal-main.lm .lv-wrap{display:flex}
.lg2{margin-bottom:10px}
.lgh{font-size:11px;color:var(--tx2);padding:4px 0;border-bottom:1px solid var(--bd);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.lgh .n{font-size:17px;font-weight:700;color:var(--tx);min-width:22px}
.lgh.tr .n{color:var(--acc)}
.lrow{display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:7px;background:var(--s2);margin-bottom:2px}
.lbar{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:26px}
.lt{font-size:11px;font-weight:700;color:var(--tx)}.lm2{font-size:10px;color:var(--tx2)}

/* ═══════════ PLAN VIEW ═══════════ */
#v-plan{flex-direction:column;overflow-y:auto;padding:24px 28px}
.plan-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.plan-hdr h2{font-size:18px;font-weight:700;letter-spacing:-.3px}
.plan-hdr h2 em{color:var(--acc);font-style:normal}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px}
.sc{background:var(--s2);border:1px solid var(--bd);border-radius:11px;padding:13px 18px;flex:1;min-width:130px;display:flex;align-items:center;gap:10px}
.sb{width:4px;height:34px;border-radius:2px;flex-shrink:0}
.sl{font-size:10px;color:var(--tx2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}
.sv{font-size:20px;font-weight:700}.ss{font-size:11px;color:var(--tx2)}
.phase{display:flex;align-items:center;gap:10px;margin:24px 0 10px;font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.7px}
.phase::before{content:'';width:3px;height:13px;border-radius:2px;background:var(--acc)}
.phase::after{content:'';flex:1;height:1px;background:var(--bd)}
.day-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dc2{background:var(--s2);border:1px solid var(--bd);border-radius:11px;padding:14px 15px;transition:border-color .12s}
.dc2:hover{border-color:var(--bd2)}
.dc2.exam-day{border-color:rgba(239,68,68,.35);background:#1b1010}
.dc2.rest-day{opacity:.6}
.dc2.free-day{border-color:rgba(99,102,241,.3)}
.dc2.full{grid-column:span 2}
.dch{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px}
.dcn{font-size:14px;font-weight:700}.dct{font-size:11px;color:var(--tx2)}
.tbadge{font-size:9px;background:var(--acc);color:#fff;border-radius:3px;padding:1px 5px;font-weight:700;margin-left:6px;vertical-align:middle}
.pbadge{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;border-radius:5px;padding:3px 9px;margin-bottom:7px;width:fit-content}
.pbadge.exam{background:rgba(239,68,68,.12);color:#f87171}
.pbadge.alert{background:rgba(245,158,11,.12);color:#fbbf24}
.pbadge.note{background:rgba(99,102,241,.1);color:#a5b4fc}
.pbadge.rest{background:rgba(255,255,255,.04);color:var(--tx2);font-style:italic;font-weight:400}
.blocks{display:flex;flex-direction:column;gap:7px}
.blk{display:flex;gap:9px;align-items:flex-start}
.blkbar{width:3px;border-radius:2px;flex-shrink:0;margin-top:3px;min-height:28px}
.blkslot{font-size:10px;color:var(--tx2);margin-bottom:1px}
.blkdesc{font-size:12px;font-weight:700;color:var(--tx);line-height:1.4}
.blkhrs{font-size:10px;color:var(--tx2);margin-top:1px}
.spill{display:inline-block;font-size:9px;font-weight:700;border-radius:3px;padding:1px 5px;margin-right:3px;vertical-align:middle}
.blocks-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.plan-summary{background:var(--s2);border:1px solid var(--bd);border-radius:11px;padding:18px 22px;margin-top:20px}
.plan-summary h3{font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.sum-row{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:14px}
.sum-item{display:flex;align-items:center;gap:7px}
.sum-dot{width:9px;height:9px;border-radius:2px}
.sum-subj{font-size:13px;font-weight:700}.sum-h{font-size:12px;color:var(--tx2)}
.strat{border-top:1px solid var(--bd);padding-top:14px}
.strat li{font-size:12px;color:var(--tx2);margin-bottom:5px;list-style:none;padding-left:14px;position:relative;line-height:1.5}
.strat li::before{content:'—';position:absolute;left:0;color:var(--tx3)}
.strat li strong{color:var(--tx)}

/* ═══════════ ALERT VIEW ═══════════ */
#v-alert{flex-direction:column;overflow-y:auto;padding:24px 28px}
#v-alert h2{font-size:17px;font-weight:700;margin-bottom:18px}
#v-alert h2 em{color:var(--acc);font-style:normal}
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px;margin-bottom:28px}
.ac{background:var(--s2);border:1px solid var(--bd);border-radius:11px;padding:14px 16px;border-left-width:3px}
.ac.red{border-left-color:var(--c-exam)}.ac.orange{border-left-color:var(--c-tutor)}.ac.unk{border-left-color:var(--tx3)}
.adate{font-size:12px;font-weight:700;margin-bottom:5px}
.ac.red .adate{color:#f87171}.ac.orange .adate{color:#fb923c}.ac.unk .adate{color:var(--tx2)}
.aroute{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:4px}
.adetail{font-size:12px;color:var(--tx2);line-height:1.6}
.adetail .buf{font-weight:700}
.ac.red .buf{color:#f87171}.ac.orange .buf{color:#fb923c}
.asec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.asec::after{content:'';flex:1;height:1px;background:var(--bd)}
</style>
</head>
<body>

<nav>
  <span class="logo">동영 <em>6월</em> 스케줄</span>
  <div class="ntabs">
    <button class="ntab on" id="t-cal" onclick="sw('cal')">달력</button>
    <button class="ntab" id="t-plan" onclick="sw('plan')">공부 플랜</button>
    <button class="ntab" id="t-alert" onclick="sw('alert')">충돌 알림 <span class="badge-n" id="alrt-n">5</span></button>
  </div>
</nav>

<!-- ── CALENDAR VIEW ── -->
<div class="view on" id="v-cal">
  <div class="cal-main" id="calMain">
    <div class="dow-row">
      <div class="dow s">일</div><div class="dow">월</div><div class="dow">화</div>
      <div class="dow">수</div><div class="dow">목</div><div class="dow">금</div><div class="dow sa">토</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="lv-wrap" id="listWrap"></div>
    <div class="leg" style="flex-shrink:0">
      <div class="li"><div class="ld" style="background:var(--c-class)"></div>수업</div>
      <div class="li"><div class="ld" style="background:var(--c-lab)"></div>랩</div>
      <div class="li"><div class="ld" style="background:var(--c-sem)"></div>세미나</div>
      <div class="li"><div class="ld" style="background:var(--c-exam)"></div>시험</div>
      <div class="li"><div class="ld" style="background:var(--c-tutor)"></div>과외</div>
      <div class="li"><div class="ld" style="background:var(--c-ws)"></div>워크숍</div>

      <div class="li"><div class="ld" style="background:var(--c-proj)"></div>프로젝트</div>
      <div style="margin-left:auto"><button onclick="toggleList()" id="listBtn" style="font-size:10px;background:var(--s3);border:1px solid var(--bd);color:var(--tx2);border-radius:6px;padding:3px 10px;cursor:pointer">목록 보기</button></div>
    </div>
  </div>
  <div class="panel">
    <div class="ph"><div class="pd" id="panelDate">날짜를 선택하세요</div><div class="ps" id="panelSub">클릭하면 상세 일정 표시</div></div>

    <div class="pal">

      <div class="pai"><div class="pad" style="background:#a855f7"></div><div class="pax"><b>6/8 9:30</b> 공학수학 동영상 마감</div></div>
      <div class="pai"><div class="pad" style="background:#8b5cf6"></div><div class="pax"><b>6/9, 6/16</b> 세미나 소감문 필수</div></div>
      <div class="pai"><div class="pad" style="background:#ef4444"></div><div class="pax"><b>6/15</b> 기말 2연속 (공학수학·방법론)</div></div>
      <div class="pai"><div class="pad" style="background:#f59e0b"></div><div class="pax"><b>6/17~18</b> 기초회로 프로젝트 시간 미정</div></div>
      <div class="pai"><div class="pad" style="background:#f97316"></div><div class="pax"><b>잠실 파크리오</b> 이동시간 DB 미등록</div></div>
    </div>
  </div>
</div>

<!-- ── PLAN VIEW ── -->
<div class="view" id="v-plan"></div>

<!-- ── ALERT VIEW ── -->
<div class="view" id="v-alert"></div>

// ── CALENDAR BUILD ───────────────────────────────────────────────────
function buildCal(){
  const g=document.getElementById('calGrid');g.innerHTML='';
  const fd=1;
  for(let i=0;i<fd;i++){const b=document.createElement('div');b.className='dc dim';b.innerHTML=`<div class="dn">${31-fd+1+i}</div>`;g.appendChild(b);}
  for(let d=1;d<=30;d++){
    const ds=`2026-06-${String(d).padStart(2,'0')}`;
    const dow=(fd+d-1)%7;
    const evs=EM[ds]||[];
    const cell=document.createElement('div');cell.className='dc';
    if(ds===TODAY)cell.classList.add('tod');
    if(evs.some(e=>e.t==='exam'))cell.classList.add('ebg');
    if(evs.some(e=>e.t==='workshop'))cell.classList.add('wbg');
    if(evs.some(e=>e.t==='travel'))cell.classList.add('tbg');
    cell.dataset.date=ds;cell.onclick=()=>selDay(ds);
    const dn=document.createElement('div');
    dn.className='dn'+(dow===0?' s':dow===6?' sa':'');
    dn.innerHTML=d+(ds===TODAY?' <span class="tb">오늘</span>':'');
    cell.appendChild(dn);
    const MX=3;
    evs.slice(0,MX).forEach(ev=>{
      const c=document.createElement('div');c.className='chip';
      c.style.background=TCh[ev.t];
      c.textContent=(ev.n||'').replace(/\[W\] /,'');
      cell.appendChild(c);
    });
    if(evs.length>MX){const m=document.createElement('div');m.className='more';m.textContent=`+${evs.length-MX}개 더`;cell.appendChild(m);}
    g.appendChild(cell);
  }
  const ld=(fd+29)%7;const need=ld===6?0:6-ld;
  for(let i=1;i<=need;i++){const b=document.createElement('div');b.className='dc dim';b.innerHTML=`<div class="dn">${i}</div>`;g.appendChild(b);}
}

function selDay(ds){
  document.querySelectorAll('.dc').forEach(c=>c.classList.remove('sel'));
  const cl=document.querySelector(`[data-date="${ds}"]`);if(cl)cl.classList.add('sel');
  const d=new Date(ds);
  document.getElementById('panelDate').textContent=`${d.getMonth()+1}월 ${d.getDate()}일 (${DOW[d.getDay()]})`;
  const evs=EM[ds]||[];
  const pb=document.getElementById('panelBody');
  if(!evs.length){pb.innerHTML='<div class="pmt">🌿 여유 있는 날</div>';document.getElementById('panelSub').textContent='일정 없음';return;}
  const cnt={};evs.forEach(e=>cnt[e.t]=(cnt[e.t]||0)+1);
  document.getElementById('panelSub').textContent=`총 ${evs.length}개 · `+Object.entries(cnt).map(([t,c])=>`${TL[t]} ${c}`).join(' · ');
  let html='',lt=null;
  for(let i=0;i<evs.length;i++){
    const ev=evs[i];
    if(ev.t!==lt){html+=`<div class="etl" style="color:${TCh[ev.t]}">${TL[ev.t]}</div>`;lt=ev.t;}
    const nm=(ev.n||'').replace(/\[W\] /,'');
    html+=`<div class="ec" style="border-left-color:${TCh[ev.t]}">
      <div class="ect">${nm}</div>
      <div class="ecm">${ev.ti?`<span>🕐 ${ev.ti}</span> `:''}${ev.loc?`<span>📍 ${ev.loc}</span>`:''}</div>
      ${ev.no?`<div class="ecn">⚠ ${ev.no}</div>`:''}
    </div>`;
    const nx=evs[i+1];
    if(nx&&ev.lid&&nx.lid&&ev.lid!==nx.lid&&ev.e!=null&&nx.s!=null){
      const tt=gtt(ev.lid,nx.lid);
      if(tt!=null){
        const md=gmd(ev.lid,nx.lid);const gap=nx.s-ev.e;const buf=gap-tt;
        let col;
        if(buf<0)col='#ef4444';else if(buf<30)col='#f97316';else col='#22c55e';
        html+=`<div class="tc"><div class="tcl"></div>
          <div class="tcp" style="background:${col}18;color:${col};border:0.5px solid ${col}40">↓ ${tt}분 · ${md}</div>
          <div class="tcb" style="color:${col}">${buf<0?`여유 ${buf}분 ⚠`:`+${buf}분`}</div>
          <div class="tcl"></div></div>`;
        lt=null;
      }
    }
  }
  pb.innerHTML=html;
}

// ── LIST VIEW ────────────────────────────────────────────────────────
let isListMode=false;
function toggleList(){
  isListMode=!isListMode;
  const cm=document.getElementById('calMain');
  const btn=document.getElementById('listBtn');
  if(isListMode){cm.classList.add('lm');btn.textContent='달력 보기';buildList();}
  else{cm.classList.remove('lm');btn.textContent='목록 보기';}
}
function buildList(){
  const lw=document.getElementById('listWrap');lw.innerHTML='';
  Object.keys(EM).sort().forEach(ds=>{
    const d=new Date(ds);const evs=EM[ds];
    const g2=document.createElement('div');g2.className='lg2';
    const h=document.createElement('div');h.className='lgh'+(ds===TODAY?' tr':'');
    h.innerHTML=`<span class="n">${d.getDate()}</span>6월 ${DOW[d.getDay()]}요일${ds===TODAY?' · 오늘':''}`;
    g2.appendChild(h);
    evs.forEach(ev=>{
      const r=document.createElement('div');r.className='lrow';
      const b=document.createElement('div');b.className='lbar';b.style.background=TCh[ev.t];
      const info=document.createElement('div');
      const nm=(ev.n||'').replace(/\[W\] /,'');
      info.innerHTML=`<div class="lt">${nm}</div><div class="lm2">${[ev.ti,ev.loc].filter(Boolean).join(' · ')||TL[ev.t]}</div>`;
      r.appendChild(b);r.appendChild(info);g2.appendChild(r);
    });
    lw.appendChild(g2);
  });
}

function sw(v){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.ntab').forEach(x=>x.classList.remove('on'));
  document.getElementById('v-'+v).classList.add('on');
  document.getElementById('t-'+v).classList.add('on');
  if(v==='plan'&&!document.getElementById('v-plan').children.length)buildPlan();
  if(v==='alert'&&!document.getElementById('v-alert').children.length)buildAlerts();
}

function buildPlan(){
  const el=document.getElementById('v-plan');
  const phases=[
    {label:'Phase 1 — 기초회로 집중 (D-9 ~ D-4)',days:PLAN.slice(0,6)},
    {label:'Phase 2 — 기초회로 마무리 + 공학수학 병행 (D-3 ~ D-1)',days:PLAN.slice(6,9)},
    {label:'Phase 3 — 시험 주간',days:PLAN.slice(9)},
  ];
  let h=`<div class="plan-hdr"><h2>시험 준비 플랜 <em>6/4–6/15</em></h2></div>
  <div class="stats">
    <div class="sc"><div class="sb" style="background:#3b82f6"></div><div><div class="sl">기초회로이론</div><div class="sv">약 24h</div><div class="ss">D-9부터 집중</div></div></div>
    <div class="sc"><div class="sb" style="background:#f59e0b"></div><div><div class="sl">공학수학2</div><div class="sv">약 13h</div><div class="ss">D-5부터 병행</div></div></div>
    <div class="sc"><div class="sb" style="background:#06b6d4"></div><div><div class="sl">방법론</div><div class="sv">약 2h</div><div class="ss">프로젝트 병행 중</div></div></div>
    <div class="sc"><div class="sb" style="background:var(--acc)"></div><div><div class="sl">총 공부 시간</div><div class="sv">약 39h</div><div class="ss">12일간</div></div></div>
  </div>`;
  phases.forEach(p=>{
    h+=`<div class="phase">${p.label}</div><div class="day-grid">`;
    p.days.forEach(day=>{
      const cls='dc2'+(day.exam?' exam-day':day.rest?' rest-day':day.free?' free-day':'')+(day.grid?' full':'');
      h+=`<div class="${cls}"><div class="dch"><span class="dcn">${day.date}${day.today?' <span class="tbadge">오늘</span>':''}</span><span class="dct">${day.total||''}</span></div>`;
      if(day.exam)h+=`<div class="pbadge exam">🎯 ${day.exam}</div>`;
      if(day.alert)h+=`<div class="pbadge alert">⚠ ${day.alert}</div>`;
      if(day.note&&!day.rest)h+=`<div class="pbadge note">${day.note}</div>`;
      if(day.rest)h+=`<div class="pbadge rest">${day.note}</div>`;
      if(day.blocks&&day.blocks.length){
        h+=`<div class="${day.grid?'blocks-grid':'blocks'}">`;
        day.blocks.forEach(b=>{
          h+=`<div class="blk"><div class="blkbar" style="background:${b.c}"></div><div><div class="blkslot">${b.s}</div><div class="blkdesc">${b.d}</div><div class="blkhrs">${b.h}</div></div></div>`;
        });
        h+='</div>';
      }
      h+='</div>';
    });
    h+='</div>';
  });
  h+=`<div class="plan-summary"><h3>전략 메모</h3>
    <div class="sum-row">
      <div class="sum-item"><div class="sum-dot" style="background:#3b82f6"></div><span class="sum-subj">기초회로</span><span class="sum-h">약 24h</span></div>
      <div class="sum-item"><div class="sum-dot" style="background:#f59e0b"></div><span class="sum-subj">공학수학2</span><span class="sum-h">약 13h</span></div>
      <div class="sum-item"><div class="sum-dot" style="background:#06b6d4"></div><span class="sum-subj">방법론</span><span class="sum-h">약 2h</span></div>
    </div>
    <ul class="strat">
      <li><strong>기초회로 우선:</strong> 시험이 6/13으로 6/15보다 이틀 빠름 — Phase 1~2 전체를 여기에 집중</li>
      <li><strong>6/12 종강일이 황금 시간:</strong> 수업 없는 유일한 평일 — 기초회로 마무리 + 공학수학 진입 동시에</li>
      <li><strong>6/14 공부 시간 매우 한정:</strong> 정현우 17시 대면 + 박재표 20:30 → 실질 공부 2.5h 이하</li>
      <li><strong>방법론은 가볍게:</strong> 바운스볼 프로젝트로 실력 확보 — 이론 범위 빠르게 훑기로 충분</li>
      <li><strong>소감문:</strong> 6/9, 6/16 세미나 후 30분 이내 작성 — 절대 빠짐 없이</li>
      <li><strong>잠실 파크리오 이동시간:</strong> DB에 없음 — 특히 6/7, 6/14, 6/21 정현우→박재표 구간 확인 필요</li>
    </ul>
  </div>`;
  el.innerHTML=h;
}
