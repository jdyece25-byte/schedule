<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6월 일정 — 동영</title>
<style>
  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --surface2: #22222a;
    --border: #2e2e38;
    --text: #e8e8ed;
    --text2: #8e8e9a;
    --text3: #5a5a66;
    --accent: #6366f1;
    --c-class:    #3b82f6;
    --c-lab:      #06b6d4;
    --c-seminar:  #8b5cf6;
    --c-exam:     #ef4444;
    --c-tutor:    #f97316;
    --c-workshop: #22c55e;
    --c-travel:   #38bdf8;
    --c-deadline: #a855f7;
    --c-project:  #f59e0b;
    --today-ring: #6366f1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

  /* ── Header ── */
  header { display: flex; align-items: center; justify-content: space-between; padding: 18px 28px 14px; border-bottom: 1px solid var(--border); }
  header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  .tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: 10px; padding: 3px; }
  .tab { padding: 5px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text2); transition: all .15s; border: none; background: transparent; }
  .tab.active { background: var(--accent); color: white; }

  /* ── Layout ── */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* ── Calendar ── */
  .cal-wrap { flex: 1; padding: 20px 20px 20px 24px; overflow-y: auto; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; }
  .cal-dow { text-align: center; font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; padding: 4px 0 8px; letter-spacing: .8px; }
  .cal-dow.sun { color: #f87171; }
  .cal-dow.sat { color: #60a5fa; }

  .day-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    min-height: 110px;
    padding: 8px 7px 6px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    position: relative;
  }
  .day-cell:hover { border-color: #444455; background: #1e1e26; }
  .day-cell.today { border-color: var(--today-ring); box-shadow: 0 0 0 1px var(--today-ring); }
  .day-cell.selected { border-color: var(--accent); background: #1d1d2e; }
  .day-cell.dim { opacity: .3; pointer-events: none; }
  .day-cell.exam-bg { background: #1f1515; }
  .day-cell.workshop-bg { background: #121f14; }
  .day-cell.travel-bg { background: #111a22; }

  .date-num { font-size: 13px; font-weight: 700; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
  .date-num.sun { color: #f87171; }
  .date-num.sat { color: #60a5fa; }
  .today-badge { font-size: 9px; background: var(--today-ring); color: white; border-radius: 4px; padding: 1px 5px; font-weight: 700; }

  .ev-chip {
    border-radius: 4px;
    padding: 2px 5px;
    margin: 2px 0;
    font-size: 10px;
    font-weight: 600;
    line-height: 1.4;
    color: white;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
  }
  .more-badge { font-size: 10px; color: var(--text3); margin-top: 2px; padding-left: 2px; }

  /* ── Side Panel ── */
  .side-panel {
    width: 320px;
    min-width: 320px;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-header { padding: 18px 20px 12px; border-bottom: 1px solid var(--border); }
  .panel-date { font-size: 18px; font-weight: 700; }
  .panel-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .panel-body { flex: 1; overflow-y: auto; padding: 14px 20px; }
  .panel-empty { color: var(--text3); font-size: 13px; text-align: center; margin-top: 40px; }

  .ev-card {
    background: var(--surface2);
    border-radius: 10px;
    padding: 11px 13px;
    margin-bottom: 8px;
    border-left: 3px solid transparent;
  }
  .ev-card-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .ev-card-meta { font-size: 11px; color: var(--text2); line-height: 1.6; }
  .ev-card-meta span { display: block; }
  .ev-card-meta .loc::before { content: '📍 '; }
  .ev-card-meta .time::before { content: '🕐 '; }
  .ev-card-meta .note { color: #f59e0b; font-weight: 600; }
  .ev-card-meta .note::before { content: '⚠️ '; }

  .ev-type-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; opacity: .8; }

  /* ── Alerts Panel ── */
  .alerts-section { border-top: 1px solid var(--border); padding: 14px 20px; }
  .alerts-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text3); margin-bottom: 10px; }
  .alert-item { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 9px; }
  .alert-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .alert-text { font-size: 11px; line-height: 1.5; color: var(--text2); }
  .alert-text strong { color: var(--text); font-weight: 700; }

  /* ── Legend ── */
  .legend { display: flex; flex-wrap: wrap; gap: 10px; padding: 10px 24px 14px; border-top: 1px solid var(--border); }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
  .leg-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* ── List view ── */
  .list-view { display: none; flex-direction: column; gap: 4px; padding: 20px 24px; overflow-y: auto; flex: 1; }
  .list-view.active { display: flex; }
  .cal-wrap.list-mode { display: none; }
  .list-day-group { margin-bottom: 8px; }
  .list-day-header { font-size: 12px; font-weight: 700; color: var(--text2); padding: 8px 0 5px; border-bottom: 1px solid var(--border); margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
  .list-day-header .dnum { font-size: 20px; font-weight: 800; color: var(--text); min-width: 30px; }
  .list-day-header.today-row .dnum { color: var(--accent); }
  .list-ev { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 8px; background: var(--surface); margin-bottom: 3px; }
  .list-ev-bar { width: 3px; height: 34px; border-radius: 2px; flex-shrink: 0; }
  .list-ev-title { font-size: 12px; font-weight: 700; }
  .list-ev-meta { font-size: 11px; color: var(--text2); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>

  { date:'2026-06-20', type:'tutor', title:'과외 · 이하린', time:'13:00–16:00', loc:'신도림 스터디카페' },

  { date:'2026-06-13', type:'tutor', title:'과외 · 김수현 (숙명여중 2)', time:'18:00–20:00', loc:'한티역' },

  { date:'2026-06-06', type:'tutor', title:'과외 · 연제이 (중1)', time:'22:00–24:00', loc:'헬리오시티' },

];

// Group events by date
const eventMap = {};
EVENTS.forEach(e => {
  if (!eventMap[e.date]) eventMap[e.date] = [];
  eventMap[e.date].push(e);
});

// Sort events within each day by type priority
const TYPE_ORDER = ['deadline','exam','project','class','lab','seminar','workshop','travel','tutor'];
Object.keys(eventMap).forEach(d => {
  eventMap[d].sort((a,b) => TYPE_ORDER.indexOf(a.type) - TYPE_ORDER.indexOf(b.type));
});

const DOW_KO = ['일','월','화','수','목','금','토'];
const MONTH_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function buildCalendar() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // Day-of-week headers
  ['일','월','화','수','목','금','토'].forEach((d,i) => {
    const h = document.createElement('div');
    h.className = 'cal-dow' + (i===0?' sun':i===6?' sat':'');
    h.textContent = d;
    grid.appendChild(h);
  });

  // First day of June 2026 is Monday (index 1)
  const firstDow = 1; // Monday
  // Pad start
  for (let i=0; i<firstDow; i++) {
    const blank = document.createElement('div');
    blank.className = 'day-cell dim';
    const prev = 31 - firstDow + 1 + i; // May days
    blank.innerHTML = `<div class="date-num">${prev}</div>`;
    grid.appendChild(blank);
  }

  for (let d=1; d<=30; d++) {
    const dateStr = `2026-06-${String(d).padStart(2,'0')}`;
    const dow = (firstDow + d - 1) % 7;
    const evs = eventMap[dateStr] || [];

    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if (dateStr === TODAY) cell.classList.add('today');

    const hasExam     = evs.some(e=>e.type==='exam');
    const hasWorkshop = evs.some(e=>e.type==='workshop');
    const hasTravel   = evs.some(e=>e.type==='travel');
    if (hasExam)     cell.classList.add('exam-bg');
    if (hasWorkshop) cell.classList.add('workshop-bg');
    if (hasTravel)   cell.classList.add('travel-bg');

    cell.dataset.date = dateStr;
    cell.onclick = () => selectDay(dateStr);

    const numDiv = document.createElement('div');
    numDiv.className = 'date-num' + (dow===0?' sun':dow===6?' sat':'');
    numDiv.innerHTML = d + (dateStr===TODAY ? ' <span class="today-badge">오늘</span>' : '');
    cell.appendChild(numDiv);

    const MAX_VISIBLE = 3;
    evs.slice(0, MAX_VISIBLE).forEach(ev => {
      const chip = document.createElement('div');
      chip.className = 'ev-chip';
      chip.style.background = TYPE_COLOR[ev.type];
      chip.title = ev.title + (ev.time ? ' · ' + ev.time : '');
      chip.textContent = ev.title.replace(/\[워크숍\] /,'');
      cell.appendChild(chip);
    });
    if (evs.length > MAX_VISIBLE) {
      const more = document.createElement('div');
      more.className = 'more-badge';
      more.textContent = `+${evs.length - MAX_VISIBLE}개 더`;
      cell.appendChild(more);
    }

    grid.appendChild(cell);
  }

  // Pad end
  const lastDow = (firstDow + 29) % 7; // 0-indexed dow of June 30
  const needed = lastDow === 6 ? 0 : 6 - lastDow;
  for (let i=1; i<=needed; i++) {
    const blank = document.createElement('div');
    blank.className = 'day-cell dim';
    blank.innerHTML = `<div class="date-num">${i}</div>`;
    grid.appendChild(blank);
  }
}

function selectDay(dateStr) {
  // Highlight
  document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
  const clicked = document.querySelector(`[data-date="${dateStr}"]`);
  if (clicked) clicked.classList.add('selected');

  const d = new Date(dateStr);
  const dow = DOW_KO[d.getDay()];
  document.getElementById('panelDate').textContent =
    `${d.getMonth()+1}월 ${d.getDate()}일 (${dow})`;

  const evs = eventMap[dateStr] || [];
  const body = document.getElementById('panelBody');

  if (!evs.length) {
    const isWeekend = d.getDay()===0||d.getDay()===6;
    body.innerHTML = `<div class="panel-empty">${isWeekend?'🌿 여유 있는 날이에요':'😮‍💨 일정 없음'}</div>`;
    return;
  }

  // Count by type
  const typeCounts = {};
  evs.forEach(e=>{ typeCounts[e.type]=(typeCounts[e.type]||0)+1; });
  const summary = Object.entries(typeCounts).map(([t,c])=>
    `${TYPE_LABEL[t]} ${c}개`).join(' · ');
  document.getElementById('panelSub').textContent = `총 ${evs.length}개 · ${summary}`;

  let html = '';
  let lastType = null;
  evs.forEach(ev => {
    if (ev.type !== lastType) {
      if (lastType) html += '';
      html += `<div class="ev-type-label" style="color:${TYPE_COLOR[ev.type]};margin-top:${lastType?'14px':'0'}">${TYPE_LABEL[ev.type]}</div>`;
      lastType = ev.type;
    }
    const title = ev.title.replace(/\[워크숍\] /,'');
    html += `<div class="ev-card" style="border-left-color:${TYPE_COLOR[ev.type]}">
      <div class="ev-card-title">${title}</div>
      <div class="ev-card-meta">
        ${ev.time ? `<span class="time">${ev.time}</span>` : ''}
        ${ev.loc  ? `<span class="loc">${ev.loc}</span>` : ''}
        ${ev.note ? `<span class="note">${ev.note}</span>` : ''}
      </div>
    </div>`;
  });
  body.innerHTML = html;
}

function buildList() {
  const lv = document.getElementById('listView');
  lv.innerHTML = '';

  const allDates = Object.keys(eventMap).sort();
  const today = TODAY;

  allDates.forEach(dateStr => {
    const d = new Date(dateStr);
    const dow = DOW_KO[d.getDay()];
    const evs = eventMap[dateStr];
    const isToday = dateStr === today;

    const group = document.createElement('div');
    group.className = 'list-day-group';

    const header = document.createElement('div');
    header.className = 'list-day-header' + (isToday ? ' today-row' : '');
    header.innerHTML = `<span class="dnum">${d.getDate()}</span>${MONTH_KO[d.getMonth()]} ${dow}요일${isToday?' · 오늘':''}`;
    group.appendChild(header);

    evs.forEach(ev => {
      const row = document.createElement('div');
      row.className = 'list-ev';
      const bar = document.createElement('div');
      bar.className = 'list-ev-bar';
      bar.style.background = TYPE_COLOR[ev.type];
      const info = document.createElement('div');
      const title = ev.title.replace(/\[워크숍\] /,'');
      info.innerHTML = `<div class="list-ev-title">${title}</div>
        <div class="list-ev-meta">${[ev.time, ev.loc].filter(Boolean).join(' · ') || TYPE_LABEL[ev.type]}</div>`;
      row.appendChild(bar);
      row.appendChild(info);
      group.appendChild(row);
    });

    lv.appendChild(group);
  });
}

function switchView(v) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  if (v === 'month') {
    document.getElementById('calWrap').classList.remove('list-mode');
    document.getElementById('listView').classList.remove('active');
  } else {
    document.getElementById('calWrap').classList.add('list-mode');
    document.getElementById('listView').classList.add('active');
  }
}

// Init
buildCalendar();
buildList();
// Auto-select today
selectDay(TODAY);
</script>
